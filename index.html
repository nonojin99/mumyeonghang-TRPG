<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무명행 — 본편 (완결판 序~終)</title>
<style>
  :root{--bg:#14101a;--bg2:#1d1726;--ink:#ece6f2;--dim:#9b8fae;--plum:#b8456b;--plum2:#d96a8e;--jade:#6fae8f;--gold:#cda85a;--ice:#5aa6cd;--line:#352b45;--danger:#e0556b;--serif:'Noto Serif KR','Nanum Myeongjo',serif;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 800px at 50% -10%,#241b30,#14101a 60%);color:var(--ink);font-family:var(--serif);line-height:1.9;min-height:100vh;display:flex;justify-content:center}
  .wrap{width:100%;max-width:720px;padding:24px 20px 80px}
  .status{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:22px;font-size:14px;color:var(--dim)}
  .status .tag{color:var(--ink)} .status .hyeop{color:var(--jade)} .status .ak{color:var(--danger)} .status .art{color:var(--gold)} .status .injury{color:var(--plum2)} .status .sili{color:var(--ice)}
  .status .sv{margin-left:auto;background:none;border:1px solid var(--line);color:var(--dim);border-radius:4px;padding:3px 10px;font-family:var(--serif);font-size:12px;cursor:pointer}
  .status .sv:hover{border-color:var(--plum);color:var(--ink)}
  .act{display:inline-block;font-size:13px;letter-spacing:.3em;color:var(--plum2);border:1px solid var(--line);border-radius:2px;padding:2px 12px;margin-bottom:14px}
  h2{font-weight:600;font-size:22px;margin:.2em 0 .8em;color:#fff}
  .scene-text{font-size:17.5px;white-space:pre-wrap;margin-bottom:28px;animation:fade .7s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .choices{display:flex;flex-direction:column;gap:12px}
  .choice{text-align:left;background:var(--bg2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:14px 16px;font-family:var(--serif);font-size:16px;cursor:pointer;transition:.15s;line-height:1.6}
  .choice:hover{border-color:var(--plum);background:#241a2e;transform:translateX(3px)}
  .choice.gated{color:var(--gold);border-color:#4a3c2a}
  .timer-wrap{margin:6px 0 18px} .timer-note{color:var(--danger);font-size:15px;margin-bottom:6px;letter-spacing:.04em}
  .timer-bar{height:6px;background:#3a2230;border-radius:3px;overflow:hidden} .timer-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--danger),var(--gold))}
  .ending-badge{font-size:14px;letter-spacing:.3em;margin-bottom:8px}
  .ending-hyeop,.ending-heukcheon,.ending-cheonha{color:var(--jade)} .ending-nangin{color:var(--gold)} .ending-omyeong{color:var(--danger)} .ending-hidden{color:var(--ice)}
  .panel{border:1px solid var(--line);border-radius:8px;padding:18px;margin:24px 0;background:rgba(0,0,0,.18)} .panel h3{margin:0 0 12px;font-size:15px;color:var(--plum2);letter-spacing:.08em}
  .flow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:13px} .flow .node{background:var(--bg2);border:1px solid var(--line);border-radius:4px;padding:3px 9px} .flow .arrow{color:var(--dim)}
  .meter{height:8px;background:#2a2236;border-radius:4px;overflow:hidden;margin:8px 0} .meter>i{display:block;height:100%;background:linear-gradient(90deg,var(--plum),var(--plum2))}
  .ends{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap} .end-chip{font-size:13px;padding:4px 10px;border-radius:20px;border:1px dashed var(--line);color:var(--dim)} .end-chip.got{border-style:solid;color:var(--ink)}
  .btn{background:var(--plum);color:#fff;border:none;border-radius:6px;padding:12px 22px;font-family:var(--serif);font-size:16px;cursor:pointer;margin:8px 8px 0 0} .btn:hover{background:var(--plum2)}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--dim)} .btn.ghost:hover{border-color:var(--plum);color:var(--ink)}
  .title-screen{text-align:center;padding-top:7vh} .title-screen h1{font-size:40px;letter-spacing:.15em;margin:0 0 6px} .title-screen .sub{color:var(--dim);margin-bottom:34px}
  .origin-card{border:1px solid var(--line);border-radius:8px;padding:18px;margin:0 auto 12px;max-width:440px;text-align:left;cursor:pointer;background:var(--bg2);transition:.15s} .origin-card:hover{border-color:var(--plum)} .origin-card.locked{opacity:.4;cursor:default}
  .oc-name{font-size:19px;color:#fff} .oc-fac{font-size:13px;color:var(--plum2);margin-left:8px} .oc-desc{font-size:14px;color:var(--dim);margin-top:6px}
  .save-row{border:1px solid var(--line);border-radius:8px;padding:14px;margin:0 auto 10px;max-width:440px;text-align:left;background:rgba(0,0,0,.2)} .save-row .sr-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .save-row .sr-title{color:#fff;font-size:16px} .save-row .sr-meta{color:var(--dim);font-size:12px} .save-row .sr-sum{color:var(--dim);font-size:13.5px;margin-top:8px;line-height:1.7}
  .save-row .sr-recap{color:#c8bcd8;font-size:13.5px;margin-top:8px;line-height:1.9;border-left:2px solid var(--line);padding-left:12px;font-style:italic}
  .foot{color:var(--dim);font-size:12px;text-align:center;margin-top:36px;letter-spacing:.05em} .sect-label{color:var(--plum2);font-size:13px;letter-spacing:.2em;margin:26px 0 12px;text-align:center}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script src="data/world.js"></script>
<script src="data/story.core.js"></script>
<script src="data/character_gen.js"></script>
<script src="data/story_main_0.js"></script>
<script src="data/story_main_1a.js"></script>
<script src="data/story_main_1b.js"></script>
<script src="data/story_main_1b_fix.js"></script>
<script src="data/story_main_2a.js"></script>
<script src="data/story_main_2b.js"></script>
<script src="data/story_main_3a.js"></script>
<script src="data/story_main_3b.js"></script>
<script src="data/story_main_4a.js"></script>
<script src="data/story_main_4b.js"></script>
<script src="data/story_main_5a.js"></script>
<script src="data/story_main_5b.js"></script>
<script src="data/story_main_var1.js"></script>
<script src="data/story_main_var2.js"></script>
<script src="engine5.js"></script>
<script src="data/main_boot.js"></script>
</body>
</html>
