<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무명행 — 강호 행로</title>
<style>
  :root{
    --bg:#14101a; --bg2:#1d1726; --ink:#ece6f2; --dim:#9b8fae;
    --plum:#b8456b; --plum2:#d96a8e; --jade:#6fae8f; --gold:#cda85a; --ice:#5aa6cd;
    --line:#352b45; --danger:#e0556b; --serif:'Noto Serif KR','Nanum Myeongjo',serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 800px at 50% -10%,#241b30,#14101a 60%);
    color:var(--ink);font-family:var(--serif);line-height:1.85;min-height:100vh;display:flex;justify-content:center}
  .wrap{width:100%;max-width:760px;padding:24px 20px 80px}
  .status{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;border-bottom:1px solid var(--line);
    padding-bottom:12px;margin-bottom:22px;font-size:14px;color:var(--dim)}
  .status .tag{color:var(--ink)} .status .hyeop{color:var(--jade)} .status .ak{color:var(--danger)}
  .status .art{color:var(--gold)} .status .injury{color:var(--plum2)} .status .sili{color:var(--ice)}
  .status .sv{margin-left:auto;background:none;border:1px solid var(--line);color:var(--dim);border-radius:4px;padding:3px 10px;font-family:var(--serif);font-size:12px;cursor:pointer}
  .status .sv:hover{border-color:var(--plum);color:var(--ink)}
  .act{display:inline-block;font-size:13px;letter-spacing:.3em;color:var(--plum2);border:1px solid var(--line);border-radius:2px;padding:2px 12px;margin-bottom:14px}
  h2{font-weight:600;font-size:22px;margin:.2em 0 .8em;color:#fff}
  .scene-text{font-size:17.5px;white-space:pre-wrap;margin-bottom:26px;animation:fade .6s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .choices{display:flex;flex-direction:column;gap:12px}
  .choice{text-align:left;background:var(--bg2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:14px 16px;font-family:var(--serif);font-size:16px;cursor:pointer;transition:.15s;line-height:1.6}
  .choice:hover{border-color:var(--plum);background:#241a2e;transform:translateX(3px)}
  .choice.gated{color:var(--gold);border-color:#4a3c2a}
  .timer-wrap{margin:6px 0 18px}
  .timer-note{color:var(--danger);font-size:15px;margin-bottom:6px;letter-spacing:.04em}
  .timer-bar{height:6px;background:#3a2230;border-radius:3px;overflow:hidden}
  .timer-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--danger),var(--gold))}
  .ending-badge{font-size:14px;letter-spacing:.3em;margin-bottom:8px}
  .ending-hyeop,.ending-heukcheon,.ending-cheonha{color:var(--jade)} .ending-nangin{color:var(--gold)}
  .ending-omyeong{color:var(--danger)} .ending-hidden{color:var(--ice)}
  .panel{border:1px solid var(--line);border-radius:8px;padding:18px;margin:24px 0;background:rgba(0,0,0,.18)}
  .panel h3{margin:0 0 12px;font-size:15px;color:var(--plum2);letter-spacing:.08em}
  .flow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:13px}
  .flow .node{background:var(--bg2);border:1px solid var(--line);border-radius:4px;padding:3px 9px}
  .flow .arrow{color:var(--dim)}
  .meter{height:8px;background:#2a2236;border-radius:4px;overflow:hidden;margin:8px 0}
  .meter>i{display:block;height:100%;background:linear-gradient(90deg,var(--plum),var(--plum2))}
  .ends{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
  .end-chip{font-size:13px;padding:4px 10px;border-radius:20px;border:1px dashed var(--line);color:var(--dim)}
  .end-chip.got{border-style:solid;color:var(--ink)}
  .btn{background:var(--plum);color:#fff;border:none;border-radius:6px;padding:12px 22px;font-family:var(--serif);font-size:16px;cursor:pointer;margin:8px 8px 0 0}
  .btn:hover{background:var(--plum2)}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--dim)}
  .btn.ghost:hover{border-color:var(--plum);color:var(--ink)}
  .title-screen{text-align:center;padding-top:7vh}
  .title-screen h1{font-size:40px;letter-spacing:.15em;margin:0 0 6px}
  .title-screen .sub{color:var(--dim);margin-bottom:34px}
  .origin-card{border:1px solid var(--line);border-radius:8px;padding:18px;margin:0 auto 12px;max-width:440px;text-align:left;cursor:pointer;background:var(--bg2);transition:.15s}
  .origin-card:hover{border-color:var(--plum)}
  .origin-card.locked{opacity:.4;cursor:default}
  .oc-name{font-size:19px;color:#fff} .oc-fac{font-size:13px;color:var(--plum2);margin-left:8px}
  .oc-desc{font-size:14px;color:var(--dim);margin-top:6px}
  .save-row{border:1px solid var(--line);border-radius:8px;padding:14px;margin:0 auto 10px;max-width:440px;text-align:left;background:rgba(0,0,0,.2)}
  .save-row .sr-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .save-row .sr-title{color:#fff;font-size:16px} .save-row .sr-meta{color:var(--dim);font-size:12px}
  .save-row .sr-sum{color:var(--dim);font-size:13.5px;margin-top:8px;line-height:1.7}
  .save-row .sr-recap{color:#c8bcd8;font-size:13.5px;margin-top:8px;line-height:1.9;border-left:2px solid var(--line);padding-left:12px;font-style:italic}
  .foot{color:var(--dim);font-size:12px;text-align:center;margin-top:36px;letter-spacing:.05em}
  .sect-label{color:var(--plum2);font-size:13px;letter-spacing:.2em;margin:26px 0 12px;text-align:center}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
/* ===== world.js ===== */
/* 무명행 TextRPG — 오리진/진영/무공 데이터 (origins.js 대체본)
 * 2층 구조: 진영 줄기(FACTIONS) + 문파 변주(ORIGINS) + 무공 풀(ARTS_POOL).
 * 브라우저(<script src>)와 Node(lint.js require) 공용.
 */

var FACTIONS = {
  jeongpa: { name: '정파', hanja: '正派', creed: '협(俠)과 명분', tone: '#c0395b' },
  sapa:    { name: '사파', hanja: '邪派', creed: '실리(實利)와 효율', tone: '#5a8f7b' }
  // cheonma / hyeolgyo / saeoe — 후속 슬라이스에서 데이터만 추가
};

var ORIGINS = {
  hwasan: {
    faction: 'jeongpa', name: '화산', hanja: '華山派',
    place: '섬서 화산 연화봉(蓮花峰)',
    essence: '축적된 검기를 한순간에 터뜨리는 정파의 명검문.',
    startScene: 'prologue'
  },
  heukdo: {
    faction: 'sapa', name: '흑도', hanja: '黑道',
    place: '강호의 뒷길 — 흑점(黑店)과 청부의 그늘',
    essence: '그림자에서 나와 그림자로 돌아가며, 한 점의 빈틈에 죽음을 박는 살문(殺門).',
    startScene: 'prologue_heukdo'
  }
};

var ARTS_POOL = {
  hwasan: [
    { id: 'gibon_geom', name: '기본 검식',         grade: '삼류', tier: 1, weight: 52 },
    { id: 'nakyeong',   name: '낙영검법',           grade: '일류', tier: 2, weight: 30 },
    { id: 'maehwa',     name: '이십사수매화검법',   grade: '절정', tier: 3, weight: 18 }
  ],
  heukdo: [
    { id: 'heukbi',  name: '흑점 비수술', grade: '삼류', tier: 1, weight: 52 },
    { id: 'muyeong', name: '무영비수술',   grade: '일류', tier: 2, weight: 30 },
    { id: 'gwisik',  name: '귀식대법',     grade: '절정', tier: 3, weight: 18 }
  ]
};

function rollMartialArt(originId, maxTier, rng) {
  rng = rng || Math.random;
  var pool = (ARTS_POOL[originId] || []).filter(function(a){ return a.tier <= (maxTier || 99); });
  if (!pool.length) return null;
  var total = pool.reduce(function(s,a){ return s + a.weight; }, 0);
  var r = rng() * total;
  for (var i=0;i<pool.length;i++){ r -= pool[i].weight; if (r <= 0) return pool[i]; }
  return pool[pool.length-1];
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = { FACTIONS: FACTIONS, ORIGINS: ORIGINS, ARTS_POOL: ARTS_POOL, rollMartialArt: rollMartialArt };
}


/* ===== story_core.js ===== */
/* 무명행 TextRPG — 장면 그래프 코어
 * SCENES는 빈 객체로 시작하고, story.<origin>.js 들이 여기에 장면을 더한다.
 * (큰 단일 파일 쓰기 회피 + "오리진=데이터 추가" 구조 정합)
 * 브라우저: var SCENES 전역. Node: module.exports로 공유, 오리진 파일이 require해 병합.
 */
var SCENES = {};
var START = 'prologue'; // 화산 기본 진입 (오리진별 진입점은 world.js ORIGINS[].startScene)

if (typeof module !== 'undefined' && module.exports) {
  module.exports = { SCENES: SCENES, START: START };
}


/* ===== story_hwasan.js ===== */
/* 무명행 TextRPG — 화산(華山) 오리진 챕터 (심화판) · 정파 줄기
 * 起 무명 → 承 입문·저잣거리(개방 정보)·수련 → 轉 위기 2비트+추격 → 結 4엔딩(숨은 1)
 */
(function () {
  var add = {

  /* ── 起 ── */
  prologue: {
    title: '무명(無名)', act: '起',
    text:
      '그대에게는 아직 이름이 없다.\n\n' +
      '산을 넘고 강을 건너온 발은 부르텄고, 품에는 부러진 목검 한 자루뿐이다. ' +
      '그러나 가슴 한복판에는 식지 않는 불씨가 있다 — 무(武)에 대한 갈망.\n\n' +
      '눈앞으로 자줏빛 노을에 잠긴 화산(華山)의 연화봉이 솟아 있다. 정파의 검이 시작되는 곳. ' +
      '그대는 무엇을 좇아 이 산을 오르는가.',
    choices: [
      { label: '협명(俠名)을 떨치기 위해 — 강호가 내 이름을 부르게 하리라', set: { motive: '협명' }, goto: 'hwasan_arrival' },
      { label: '잃어버린 사문(師門)의 자취를 좇아', set: { motive: '사문' }, goto: 'hwasan_arrival' },
      { label: '그저 더 강해지기 위해 — 명분 따위는 나중 일이다', set: { motive: '무', ak: +1 }, goto: 'hwasan_arrival' }
    ]
  },

  /* ── 承 ── */
  hwasan_arrival: {
    title: '연화봉 초입', act: '承',
    text:
      '돌계단 끝, 매화 수실을 검병에 단 젊은 검객이 길을 막는다. 화산의 일대제자, 매화검수(梅花劍手)다.\n\n' +
      '"이름 없는 자가 어인 일로 본문(本門)의 산을 오르는가." 경계하되, 검을 함부로 빼들 만큼 가볍지는 않다.',
    choices: [
      { label: '검을 내려놓고 공손히 입문을 청한다', set: { rel_geomsu: +1 }, goto: 'hwasan_test' },
      { label: '"화산의 검이 그리 대단하오? 한 수 보여주시오" — 도발한다', set: { ak: +1 }, goto: 'hwasan_spar' },
      { label: '"명분을 앞세우는 정파의 위선이 우습소" — 비웃는다', set: { ak: +2 }, goto: 'hwasan_rebuff' }
    ]
  },
  hwasan_spar: {
    title: '연화봉 비무', act: '承',
    text:
      '검수가 검을 뽑는다. 떨어지는 꽃잎 같은 연검(連劍). 그대는 끝까지 맞선다. ' +
      '승패는 가리지 못했으나, 검수의 눈에서 경계가 옅어진다.\n\n' +
      '"무명인치고는… 검을 아는 자로군. 장로께 고하겠다, 본문에 들 뜻이 있다면."',
    choices: [
      { label: '"가르침을 받겠소" — 입문을 청한다', set: { rel_geomsu: +1 }, goto: 'hwasan_test' },
      { label: '"객(客)으로 머물겠소" — 입문은 사양한다', set: { joined: false }, goto: 'hwasan_market' }
    ]
  },
  hwasan_rebuff: {
    title: '냉대', act: '承',
    text:
      '검수의 얼굴이 굳는다. "사마외도(邪魔外道)의 혀를 가진 자는 이 산에 들 수 없다." ' +
      '화산의 명분은 때로 칼날보다 차갑다.',
    choices: [
      { label: '말을 거두고 정중히 입문을 청한다', goto: 'hwasan_test' },
      { label: '코웃음 치고 등을 돌려 산을 내려간다', set: { joined: false, ak: +1 }, goto: 'hwasan_market' }
    ]
  },
  hwasan_test: {
    title: '입문 — 무공 전수', act: '承', effect: 'rollArt',
    text:
      '연화봉 도관(道觀). 자줏빛 도포의 장로가 한 권의 검보(劍譜)를 내민다. ' +
      '"무의 그릇은 타고나되, 갈고닦음은 사람의 몫이다."\n\n— 그대는 「{art}」을(를) 전수받았다.',
    choices: [ { label: '검보를 받들고, 화산의 제자가 된다', set: { joined: true, hyeop: +1 }, goto: 'hwasan_market' } ]
  },

  /* 承 — 저잣거리: 개방(丐幇) 정보 이벤트 (정파 정보망, 적선·의리) */
  hwasan_market: {
    title: '연화봉 아랫마을', act: '承',
    text:
      '산 아래 저잣거리. 누더기를 걸친 개방(丐幇)의 거지가 그대를 알아본다. ' +
      '"협(俠)의 길을 걷는 분이시군. 우리 거지들 눈이 천 개라, 요즘 연화봉 길목이 뒤숭숭하단 소문이… ' +
      '한 푼 적선이면, 들려드리지요."',
    choices: [
      { label: '적선하고 자세한 정보를 산다 (앞길의 위험을 미리 안다)', set: { bossIntel: true, hyeop: +1 }, goto: 'hwasan_training' },
      { label: '공짜 소문만 슬쩍 듣는다', set: { rumor: true }, goto: 'hwasan_training' },
      { label: '거지를 무시하고 지나친다', goto: 'hwasan_training' }
    ]
  },

  /* 承 — 수련 갈래(修練岐路): 위험/안정 */
  hwasan_training: {
    title: '수련(修練)', act: '承',
    text:
      '객잔의 밤. 검보를 펼친다. 매화는 혹한을 견뎌야 핀다 했다. ' +
      '내공을 어떻게 다스릴 것인가.',
    choices: [
      { label: '무리하게 검기를 끌어올린다 (강해지나 내상의 위험)', set: { trained: true, naesang: true }, goto: 'crisis_ambush' },
      { label: '기초를 안정되게 다진다', set: { trained: true }, goto: 'crisis_ambush' },
      { label: '동문과 검을 나누며 정을 쌓는다', set: { rel_geomsu: +1 }, goto: 'crisis_ambush' }
    ]
  },

  /* ── 轉 (2비트 위기) ── */
  crisis_ambush: {
    title: '연화봉의 비명', act: '轉',
    text:
      (/*bossIntel 시 다른 도입*/ '') +
      '산길을 도는 순간, 비린내가 코를 찌른다.\n\n' +
      '검은 복면의 살수(殺手)가 쓰러진 순례 도사의 목을 노린다 — 혈교(血敎)의 끄나풀. ' +
      '도사의 옆구리에서 멎지 않는 피가 솟는다. 살수의 칼끝이 천천히 그대를 향해 돌아선다.\n\n' +
      '도사의 숨이 가빠진다. 둘 다는 구할 수 없을지도 모른다.\n\n(다음 순간, 그대의 몸이 먼저 움직여야 한다.)',
    choices: [ { label: '― 숨을 고르고, 뛰어든다', goto: 'crisis_decision' } ]
  },
  crisis_decision: {
    title: '찰나', act: '轉',
    text: '피가 멎지 않는다. 살수의 칼이 떨어진다.',
    timedNote: '지금 — 몸이 먼저 움직인다.',
    choices: [
      { label: '도사를 지혈한다 (살수는 놓친다)', set: { hyeop: +2, savedPilgrim: true, assassinFled: true }, goto: 'crisis_after' },
      { label: '살수를 먼저 벤다 (도사를 지킬 틈이 없다)', set: { killedAssassin: true, savedPilgrim: false, naesang: true }, goto: 'crisis_after' },
      { label: '❖ 검기로 살수를 묶고 도사를 끌어낸다', requires: { artTierMin: 2 }, set: { hyeop: +3, savedPilgrim: true, killedAssassin: true }, goto: 'crisis_after' }
    ],
    timed: 9,
    onTimeout: { set: { timeFail: true, ak: +1, savedPilgrim: false, assassinFled: true }, goto: 'crisis_after' }
  },

  /* 轉 — 두 번째 비트: 놓친 살수 추격(지연 분기 회수). 정보를 샀으면 추격 유리 */
  crisis_after: {
    title: '핏자국', act: '轉',
    text:
      '소동이 가라앉는다. 살아남은 자와, 사라진 자가 남았다. 핏자국이 산 아래로 이어진다.',
    choices: [
      { label: '달아난 살수를 쫓는다', requires: { flag: 'assassinFled', eq: true }, set: { pursued: true }, goto: 'crisis_pursuit' },
      { label: '도사를 부축해 화산으로 돌아간다', goto: 'aftermath' }
    ]
  },
  crisis_pursuit: {
    title: '추격', act: '轉',
    text:
      '핏자국을 따라간 끝, 살수가 숨을 헐떡이며 돌아선다. ' +
      '(개방의 정보가 있었다면, 그대는 이미 그의 퇴로를 알고 있다.)\n\n' +
      '"혈교는… 한 번 점찍은 자를 잊지 않는다." 그가 비웃는다.',
    choices: [

/* 무명행 TextRPG — 엔진 v2 (멀티 오리진 + SAVE/LOAD + 내레이션식 줄거리 요약)
 * 변경점: 플레이 중 선택을 _log에 기록 → 로드 시 "누가 줄거리를 읽어주듯" 주요 대사·선택을 되짚어준다.
 * 전역(world.js, story.*.js): SCENES, START, FACTIONS, ORIGINS, ARTS_POOL, rollMartialArt
 */
var EXP_KEY = 'mumyeong_trpg_explore_v2';
var SAVE_KEY = 'mumyeong_trpg_saves_v3';
var mem = { visited: [], endings: [] };
var saves = [];
function loadStore() {
  try { var r = localStorage.getItem(EXP_KEY); if (r) mem = JSON.parse(r); } catch (e) {}
  try { var s = localStorage.getItem(SAVE_KEY); if (s) saves = JSON.parse(s); } catch (e) {}
  mem.visited = mem.visited || []; mem.endings = mem.endings || []; saves = saves || [];
}
function saveExp() { try { localStorage.setItem(EXP_KEY, JSON.stringify(mem)); } catch (e) {} }
function persistSaves() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(saves)); } catch (e) {} }
function markVisited(id) { if (mem.visited.indexOf(id) < 0) { mem.visited.push(id); saveExp(); } }
function markEnding(k) { if (mem.endings.indexOf(k) < 0) { mem.endings.push(k); saveExp(); } }

var flags = {};
var curTimer = null;

function newRun(originId) {
  var o = ORIGINS[originId];
  flags = { origin: originId, faction: o.faction, _path: [], _log: [] };
  go(o.startScene);
}

function meets(req) {
  if (!req) return true;
  if ('artTierMin' in req) return (flags.artTier || 0) >= req.artTierMin;
  if ('flag' in req) {
    var has = (req.flag in flags), v = flags[req.flag];
    if ('gte' in req) return (v || 0) >= req.gte;
    if ('lte' in req) return (v || 0) <= req.lte;
    if ('eq' in req) return (has ? v : undefined) === req.eq;
    return !!v;
  }
  return true;
}
function applySet(set) { if (!set) return; for (var k in set) { var v = set[k]; flags[k] = (typeof v === 'number') ? ((flags[k] || 0) + v) : v; } }
function resolveGoto(goto) {
  if (typeof goto === 'string') return goto;
  var ok = goto.filter(function (g) { return meets(g.requires); });
  if (!ok.length) return null;
  if (ok.some(function (g) { return 'weight' in g; })) {
    var tot = ok.reduce(function (s, g) { return s + (g.weight || 1); }, 0);
    var r = Math.random() * tot;
    for (var i = 0; i < ok.length; i++) { r -= (ok[i].weight || 1); if (r <= 0) return ok[i].goto; }
    return ok[ok.length - 1].goto;
  }
  return ok[0].goto;
}

function go(id) {
  clearTimer();
  var sc = SCENES[id];
  if (!sc) { document.getElementById('app').innerHTML = '<p>오류: 장면 ' + id + ' 없음</p>'; return; }
  flags._path.push(id); flags._scene = id; markVisited(id);
  if (sc.effect === 'rollArt') {
    var art = rollMartialArt(flags.origin, 3);
    if (art) { flags.artId = art.id; flags.artName = art.name; flags.artGrade = art.grade; flags.artTier = art.tier; }
  }
  if (sc.ending) { markEnding(sc.endKind); renderEnding(sc); return; }
  renderScene(id, sc);
}
function pickChoice(ch, isTimeout) {
  clearTimer();
  // 내레이션 로그: 어느 장면에서 어떤 선택을 했는지 기록
  var here = SCENES[flags._scene];
  flags._log = flags._log || [];
  flags._log.push({ t: here ? here.title : flags._scene, act: here ? here.act : '', c: isTimeout ? '머뭇거렸다' : ch.label });
  applySet(ch.set); var n = resolveGoto(ch.goto); if (n) go(n);
}

function esc(s) { return String(s).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }
function fillText(t) { var art = flags.artName ? (flags.artName + '(' + flags.artGrade + ')') : '무명의 무공'; return esc(t).replace(/\{art\}/g, art); }
function statusBar(withSave) {
  var b = [];
  b.push('<span class="tag">' + (ORIGINS[flags.origin] ? ORIGINS[flags.origin].name : '무명') + '</span>');
  if (flags.artName) b.push('<span class="art">무공: ' + esc(flags.artName) + ' (' + flags.artGrade + ')</span>');
  if ((flags.hyeop || 0) > 0) b.push('<span class="hyeop">俠名 ' + flags.hyeop + '</span>');
  if ((flags.sili || 0) > 0) b.push('<span class="sili">實利 ' + flags.sili + '</span>');
  if ((flags.ak || 0) > 0) b.push('<span class="ak">惡名 ' + flags.ak + '</span>');
  if (flags.naesang) b.push('<span class="injury">내상(內傷)</span>');
  if (withSave) b.push('<button class="sv" id="savebtn">저장</button>');
  return '<div class="status">' + b.join('') + '</div>';
}
function renderScene(id, sc) {
  var app = document.getElementById('app');
  var html = statusBar(true);
  html += '<div class="act">' + sc.act + '</div><h2>' + esc(sc.title) + '</h2>';
  html += '<div class="scene-text">' + fillText(sc.text) + '</div>';
  if (sc.timed) html += '<div class="timer-wrap"><div class="timer-note">' + esc(sc.timedNote || '서둘러야 한다.') + '</div><div class="timer-bar"><div class="timer-fill" id="tfill"></div></div></div>';
  html += '<div class="choices">';
  sc.choices.forEach(function (ch, i) { if (ch.requires && !meets(ch.requires)) return; html += '<button class="choice' + (ch.requires ? ' gated' : '') + '" data-i="' + i + '">' + esc(ch.label) + '</button>'; });
  html += '</div>';
  app.innerHTML = html;
  app.querySelectorAll('.choice').forEach(function (b) { b.onclick = function () { pickChoice(sc.choices[+b.dataset.i], false); }; });
  var sb = document.getElementById('savebtn'); if (sb) sb.onclick = function () { doSave(); };
  if (sc.timed) startTimer(sc);
}
function startTimer(sc) {
  var fill = document.getElementById('tfill'), dur = sc.timed * 1000, t0 = Date.now();
  curTimer = setInterval(function () {
    var left = Math.max(0, dur - (Date.now() - t0));
    if (fill) fill.style.width = (left / dur * 100) + '%';
    if (left <= 0) { clearTimer(); flags._log = flags._log || []; var here = SCENES[flags._scene]; flags._log.push({ t: here ? here.title : '', act: here ? here.act : '', c: '머뭇거렸다' }); applySet(sc.onTimeout.set); var n = resolveGoto(sc.onTimeout.goto); if (n) go(n); }
  }, 60);
}
function clearTimer() { if (curTimer) { clearInterval(curTimer); curTimer = null; } }

function renderEnding(sc) {
  var app = document.getElementById('app');
  var total = Object.keys(SCENES).length;
  var explored = mem.visited.filter(function (v) { return SCENES[v]; }).length;
  var pct = Math.round(explored / total * 100);
  var flow = flags._path.map(function (p) { return '<span class="node">' + esc(SCENES[p] ? SCENES[p].title : p) + '</span>'; }).join('<span class="arrow">→</span>');
  var endDefs = [['hyeop', '협객'], ['heukcheon', '실리/세력'], ['nangin', '낭인'], ['omyeong', '오명'], ['hidden', '숨은 길'], ['cheonha', '군림천하']];
  var chips = endDefs.map(function (e) { return '<span class="end-chip' + (mem.endings.indexOf(e[0]) >= 0 ? ' got' : '') + '">' + (mem.endings.indexOf(e[0]) >= 0 ? '✦ ' : '· ') + e[1] + '</span>'; }).join('');
  var html = statusBar(false);
  html += '<div class="ending-badge ending-' + sc.endKind + '">— 엔딩 —</div><h2>' + esc(sc.title) + '</h2>';
  html += '<div class="scene-text">' + fillText(sc.text) + '</div>';
  html += '<div class="panel"><h3>이번 행로(行路)</h3><div class="flow">' + flow + '</div></div>';
  html += '<div class="panel"><h3>탐색한 강호</h3><div class="meter"><i style="width:' + pct + '%"></i></div>' +
    '<div style="font-size:14px;color:var(--dim)">본 장면 ' + explored + ' / ' + total + ' (' + pct + '%)</div>' +
    '<div class="ends">' + chips + '</div></div>';
  html += '<button class="btn" id="restart">다시 강호로</button>';
  app.innerHTML = html;
  document.getElementById('restart').onclick = titleScreen;
}

/* ───────── SAVE / LOAD ───────── */
function doSave() {
  var slot = { id: Date.now(), ts: new Date().toLocaleString('ko-KR'), origin: flags.origin, scene: flags._scene, flags: JSON.parse(JSON.stringify(flags)) };
  saves.unshift(slot); if (saves.length > 6) saves = saves.slice(0, 6); persistSaves();
  var sb = document.getElementById('savebtn'); if (sb) { sb.textContent = '저장됨 ✓'; setTimeout(function () { if (sb) sb.textContent = '저장'; }, 1500); }
}
function loadSlot(slot) { flags = JSON.parse(JSON.stringify(slot.flags)); flags._path = flags._path || []; flags._log = flags._log || []; go(slot.scene); }
function deleteSlot(id) { saves = saves.filter(function (s) { return s.id !== id; }); persistSaves(); titleScreen(); }

/* 내레이션식 줄거리 요약 — 누가 그대의 행로를 읽어주듯, 주요 선택/대사를 되짚는다 */
function buildNarration(slot) {
  var f = slot.flags, o = ORIGINS[f.origin];
  var head = '「' + (o ? o.name : '무명') + '」에서 시작한 한 무명인의 이야기.';
  if (f.motive) head += ' “' + f.motive + '”의 뜻을 품었지.';
  if (f.artName) head += ' 무공은 ' + f.artName + '(' + f.artGrade + '). ';

  var log = (f._log || []).filter(function (b) { return b.c && b.c.indexOf('―') !== 0; }); // 단순 '계속' 비트 제외
  var beats = log.slice(-7); // 최근 핵심 7개
  var lines = beats.map(function (b) {
    return '· 「' + b.t + '」에서, 그대는 ‘' + b.c + '’ — 그랬었지.';
  });

  var rep = [];
  if (f.hyeop) rep.push('俠名 ' + f.hyeop);
  if (f.sili) rep.push('實利 ' + f.sili);
  if (f.ak) rep.push('惡名 ' + f.ak);
  if (f.naesang) rep.push('내상');
  var here = SCENES[slot.scene] ? SCENES[slot.scene].title : slot.scene;
  var tail = '…그리고 지금, 「' + here + '」 앞에 그대가 서 있다.';

  return { head: head, lines: lines, rep: rep, tail: tail };
}

/* ───────── 타이틀 ───────── */
function titleScreen() {
  clearTimer();
  var app = document.getElementById('app');
  var cards = '';
  for (var id in ORIGINS) {
    var o = ORIGINS[id];
    cards += '<div class="origin-card" data-id="' + id + '"><span class="oc-name">' + o.name + '</span>' +
      '<span class="oc-fac">' + (FACTIONS[o.faction] ? FACTIONS[o.faction].name : o.faction) + ' · ' + o.place + '</span>' +
      '<div class="oc-desc">' + esc(o.essence) + '</div></div>';
  }
  var locked = [['남해태양궁', '새외 · 화(火)'], ['천마신교', '마교'], ['혈교', '혈교']];
  locked.forEach(function (l) { cards += '<div class="origin-card locked"><span class="oc-name">' + l[0] + '</span><span class="oc-fac">' + l[1] + '</span><div class="oc-desc">— 데이터 파일 하나로 열리는 오리진 (예정)</div></div>'; });

  var saveHtml = '';
  if (saves.length) {
    saveHtml = '<div class="sect-label">─ 이어하기 (지난 이야기를 들려드리지요) ─</div>';
    saves.forEach(function (s) {
      var o = ORIGINS[s.origin], n = buildNarration(s);
      saveHtml += '<div class="save-row"><div class="sr-head"><span class="sr-title">' + (o ? o.name : '무명') + ' 행로</span><span class="sr-meta">' + s.ts + '</span></div>' +
        '<div class="sr-sum">' + esc(n.head) + '</div>' +
        (n.lines.length ? '<div class="sr-recap">' + n.lines.map(esc).join('<br>') + '</div>' : '') +
        '<div class="sr-sum">' + (n.rep.length ? '[' + n.rep.join(' · ') + '] ' : '') + esc(n.tail) + '</div>' +
        '<div style="margin-top:10px"><button class="btn" data-load="' + s.id + '">이어하기</button><button class="btn ghost" data-del="' + s.id + '">삭제</button></div></div>';
    });
  }

  app.innerHTML = '<div class="title-screen"><h1>無名行</h1><div class="sub">강호 행로 — 프로토타입</div>' +
    '<div class="sect-label">─ 새 행로: 본교지를 고르라 ─</div>' + cards + saveHtml +
    '<div class="foot">시작점이 곧 진영의 선택이다. 플레이 중 ‘저장’으로 행로를 남길 수 있다.</div></div>';
  app.querySelectorAll('.origin-card[data-id]').forEach(function (c) { c.onclick = function () { newRun(c.dataset.id); }; });
  app.querySelectorAll('[data-load]').forEach(function (b) { b.onclick = function () { var s = saves.filter(function (x) { return x.id == b.dataset.load; })[0]; if (s) loadSlot(s); }; });
  app.querySelectorAll('[data-del]').forEach(function (b) { b.onclick = function () { deleteSlot(+b.dataset.del); }; });
}

loadStore();
titleScreen();

</script>
